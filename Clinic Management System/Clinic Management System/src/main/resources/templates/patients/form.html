<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/base :: head}"></th:block>
</head>
<body>
<th:block th:replace="~{layout/base :: body(
    content=~{::content},
    pageTitle=${patient.id == null} ? 'New Patient' : 'Edit Patient',
    activePage='patients')}">

    <th:block th:fragment="content">

        <!-- Geri butonu -->
        <div class="mb-4">
            <a th:href="@{/patients}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i> Back to Patients
            </a>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">

                    <div class="card-header d-flex align-items-center gap-2">
                        <i class="bi bi-person-plus text-primary"></i>
                        <!--
                          Koşula göre başlık değişir:
                          id null → yeni hasta
                          id var  → düzenleme
                        -->
                        <span th:text="${patient.id == null}
                                       ? 'Add New Patient'
                                       : 'Edit Patient: ' + patient.fullName">
                        </span>
                    </div>

                    <div class="card-body p-4">
                        <!--
                          th:action → formun nereye gideceği
                          th:object → form hangi Java objesiyle bağlı
                            Her input ${patient.fieldName} ile bağlanır
                          method="post" → POST /patients/save gidecek
                        -->
                        <form th:action="@{/patients/save}"
                              th:object="${patient}"
                              method="post">

                            <!--
                              GİZLİ ALAN — id
                              Güncelleme yapılırken id'yi saklıyoruz
                              Kullanıcı görmez ama form ile gönderilir
                              id null ise boş gönderilir → yeni hasta
                            -->
                            <input type="hidden" th:field="*{id}"/>

                            <div class="row g-3">

                                <!-- Full Name -->
                                <div class="col-md-12">
                                    <label class="form-label fw-semibold">
                                        Full Name <span class="text-danger">*</span>
                                    </label>
                                    <!--
                                      th:field="*{fullName}"
                                      * → th:object'teki Patient'a refer eder
                                      Bu satır şunu yapar:
                                        id="fullName"
                                        name="fullName"
                                        value="${patient.fullName}"
                                      Hepsini tek seferde!
                                    -->
                                    <input type="text"
                                           th:field="*{fullName}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('fullName')}
                                                           ? 'is-invalid'"
                                           placeholder="John Smith"/>
                                    <!--
                                      Validasyon hatası varsa göster
                                      @NotBlank boşsa: "Name is required"
                                    -->
                                    <div class="invalid-feedback"
                                         th:errors="*{fullName}"></div>
                                </div>

                                <!-- Date of Birth -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        Date of Birth <span class="text-danger">*</span>
                                    </label>
                                    <input type="date"
                                           th:field="*{dateOfBirth}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('dateOfBirth')}
                                                           ? 'is-invalid'"/>
                                    <div class="invalid-feedback"
                                         th:errors="*{dateOfBirth}"></div>
                                </div>

                                <!-- Gender -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        Gender <span class="text-danger">*</span>
                                    </label>
                                    <!--
                                      select → dropdown menü
                                      th:field="*{gender}" → seçilen değer Patient.gender'a gider
                                    -->
                                    <select th:field="*{gender}"
                                            class="form-select"
                                            th:classappend="${#fields.hasErrors('gender')}
                                                            ? 'is-invalid'">
                                        <option value="">Select gender...</option>
                                        <!--
                                          th:each → genders listesini döngüye al
                                          Controller'dan model.addAttribute("genders",
                                          Patient.Gender.values()) geldi
                                        -->
                                        <option th:each="g : ${genders}"
                                                th:value="${g}"
                                                th:text="${g}">
                                        </option>
                                    </select>
                                    <div class="invalid-feedback"
                                         th:errors="*{gender}"></div>
                                </div>

                                <!-- Phone -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">
                                        Phone <span class="text-danger">*</span>
                                    </label>
                                    <input type="tel"
                                           th:field="*{phone}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('phone')}
                                                           ? 'is-invalid'"
                                           placeholder="+1 555 0000"/>
                                    <div class="invalid-feedback"
                                         th:errors="*{phone}"></div>
                                </div>

                                <!-- Email -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input type="email"
                                           th:field="*{email}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('email')}
                                                           ? 'is-invalid'"
                                           placeholder="john@email.com"/>
                                    <div class="invalid-feedback"
                                         th:errors="*{email}"></div>
                                </div>

                                <!-- Blood Type -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Blood Type</label>
                                    <select th:field="*{bloodType}" class="form-select">
                                        <option value="">Unknown</option>
                                        <option value="A+">A+</option>
                                        <option value="A-">A-</option>
                                        <option value="B+">B+</option>
                                        <option value="B-">B-</option>
                                        <option value="AB+">AB+</option>
                                        <option value="AB-">AB-</option>
                                        <option value="O+">O+</option>
                                        <option value="O-">O-</option>
                                    </select>
                                </div>

                                <!-- Address -->
                                <div class="col-md-12">
                                    <label class="form-label fw-semibold">Address</label>
                                    <textarea th:field="*{address}"
                                              class="form-control"
                                              rows="2"
                                              placeholder="123 Main St, City..."></textarea>
                                </div>

                            </div>

                            <!-- ── KAYDET BUTONU ── -->
                            <div class="d-flex gap-2 mt-4 pt-3
                                        border-top justify-content-end">
                                <a th:href="@{/patients}"
                                   class="btn btn-outline-secondary">
                                    Cancel
                                </a>
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-check-lg me-1"></i>
                                    <!--
                                      id null → "Save Patient"
                                      id var  → "Update Patient"
                                    -->
                                    <span th:text="${patient.id == null}
                                                   ? 'Save Patient'
                                                   : 'Update Patient'">
                                    </span>
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>

    </th:block>
</th:block>
</body>
</html>
