<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{layout/base :: head}"></th:block></head>
<body>
<th:block th:replace="~{layout/base :: body(content=~{::content}, pageTitle='Billing', activePage='billing')}">
    <th:block th:fragment="content">

        <!-- Üst istatistikler -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div style="width:48px;height:48px;border-radius:12px;background:#dcfce7;
                                display:flex;align-items:center;justify-content:center;">
                            <i class="bi bi-cash-stack text-success fs-5"></i>
                        </div>
                        <div>
                            <div class="text-muted" style="font-size:0.8rem;">Total Revenue</div>
                            <div class="fw-bold fs-5" th:text="'$' + ${totalRevenue}">$0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div style="width:48px;height:48px;border-radius:12px;background:#fef9c3;
                                display:flex;align-items:center;justify-content:center;">
                            <i class="bi bi-hourglass text-warning fs-5"></i>
                        </div>
                        <div>
                            <div class="text-muted" style="font-size:0.8rem;">Pending Bills</div>
                            <div class="fw-bold fs-5" th:text="${pendingCount}">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div style="width:48px;height:48px;border-radius:12px;background:#eff6ff;
                                display:flex;align-items:center;justify-content:center;">
                            <i class="bi bi-receipt text-primary fs-5"></i>
                        </div>
                        <div>
                            <div class="text-muted" style="font-size:0.8rem;">Total Bills</div>
                            <div class="fw-bold fs-5" th:text="${bills.size()}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="mb-0 fw-bold">All Bills</h5>
            <a th:href="@{/billing/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i> New Bill
            </a>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th class="ps-4">#</th>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Method</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="bill : ${bills}">
                        <td class="ps-4 text-muted" th:text="${bill.id}"></td>
                        <td class="fw-semibold" th:text="${bill.appointment.patient.fullName}"></td>
                        <td th:text="${bill.appointment.doctor.fullName}"></td>
                        <td th:text="${bill.appointment.appointmentDate}"></td>
                        <td class="fw-semibold" th:text="'$' + ${bill.totalAmount}"></td>
                        <td>
                        <span th:class="${bill.paymentStatus.name() == 'PAID'} ?
                                         'badge bg-success bg-opacity-10 text-success' :
                                         (${bill.paymentStatus.name() == 'PENDING'} ?
                                         'badge bg-warning bg-opacity-10 text-warning' :
                                         'badge bg-danger bg-opacity-10 text-danger')"
                              th:text="${bill.paymentStatus}">
                        </span>
                        </td>
                        <td th:text="${bill.paymentMethod} ?: '-'"></td>
                        <td class="text-center">
                            <a th:href="@{/billing/edit/{id}(id=${bill.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:if="${bill.paymentStatus.name() == 'PENDING'}"
                               th:href="@{/billing/pay/{id}(id=${bill.id})}"
                               class="btn btn-sm btn-success">
                                <i class="bi bi-cash me-1"></i>Pay
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${bills.isEmpty()}">
                        <td colspan="8" class="text-center py-5 text-muted">
                            <i class="bi bi-receipt fs-1 d-block mb-2"></i>
                            No bills yet.
                            <a th:href="@{/billing/new}">Create first bill</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </th:block>
</th:block>
</body>
</html>
