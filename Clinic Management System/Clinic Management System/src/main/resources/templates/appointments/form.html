<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{layout/base :: head}"></th:block></head>
<body>
<th:block th:replace="~{layout/base :: body(content=~{::content}, pageTitle='New Appointment', activePage='appointments')}">
    <th:block th:fragment="content">

        <div class="mb-4">
            <a th:href="@{/appointments}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i> Back to Appointments
            </a>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header d-flex align-items-center gap-2">
                        <i class="bi bi-calendar-plus text-primary"></i>
                        <span th:text="${appointment.id == null} ? 'Book New Appointment' : 'Edit Appointment'"></span>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/appointments/save}" th:object="${appointment}" method="post">
                            <input type="hidden" th:field="*{id}"/>

                            <div class="row g-3">
                                <!-- Patient seçimi -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Patient <span class="text-danger">*</span></label>
                                    <select name="patientId" class="form-select" required>
                                        <option value="">Select patient...</option>
                                        <option th:each="p : ${patients}"
                                                th:value="${p.id}"
                                                th:text="${p.fullName}"
                                                th:selected="${appointment.patient != null and appointment.patient.id == p.id}">
                                        </option>
                                    </select>
                                </div>

                                <!-- Doctor seçimi -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Doctor <span class="text-danger">*</span></label>
                                    <select name="doctorId" class="form-select" required>
                                        <option value="">Select doctor...</option>
                                        <option th:each="d : ${doctors}"
                                                th:value="${d.id}"
                                                th:text="${d.fullName + ' — ' + d.specialization}"
                                                th:selected="${appointment.doctor != null and appointment.doctor.id == d.id}">
                                        </option>
                                    </select>
                                </div>

                                <!-- Tarih -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Date <span class="text-danger">*</span></label>
                                    <input type="date" th:field="*{appointmentDate}" class="form-control"
                                           th:classappend="${#fields.hasErrors('appointmentDate')} ? 'is-invalid'"/>
                                    <div class="invalid-feedback" th:errors="*{appointmentDate}"></div>
                                </div>

                                <!-- Saat -->
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Time <span class="text-danger">*</span></label>
                                    <select th:field="*{appointmentTime}" class="form-select">
                                        <option value="">Select time...</option>
                                        <option value="08:00">08:00 AM</option>
                                        <option value="08:30">08:30 AM</option>
                                        <option value="09:00">09:00 AM</option>
                                        <option value="09:30">09:30 AM</option>
                                        <option value="10:00">10:00 AM</option>
                                        <option value="10:30">10:30 AM</option>
                                        <option value="11:00">11:00 AM</option>
                                        <option value="11:30">11:30 AM</option>
                                        <option value="13:00">01:00 PM</option>
                                        <option value="13:30">01:30 PM</option>
                                        <option value="14:00">02:00 PM</option>
                                        <option value="14:30">02:30 PM</option>
                                        <option value="15:00">03:00 PM</option>
                                        <option value="15:30">03:30 PM</option>
                                        <option value="16:00">04:00 PM</option>
                                        <option value="16:30">04:30 PM</option>
                                    </select>
                                </div>

                                <!-- Status — sadece edit'te göster -->
                                <div class="col-md-6" th:if="${appointment.id != null}">
                                    <label class="form-label fw-semibold">Status</label>
                                    <select th:field="*{status}" class="form-select">
                                        <option th:each="s : ${statuses}"
                                                th:value="${s}"
                                                th:text="${s}">
                                        </option>
                                    </select>
                                </div>

                                <!-- Notlar -->
                                <div class="col-md-12">
                                    <label class="form-label fw-semibold">Notes</label>
                                    <textarea th:field="*{notes}" class="form-control" rows="3"
                                              placeholder="Reason for visit, symptoms..."></textarea>
                                </div>
                            </div>

                            <div class="d-flex gap-2 mt-4 pt-3 border-top justify-content-end">
                                <a th:href="@{/appointments}" class="btn btn-outline-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-check-lg me-1"></i>
                                    <span th:text="${appointment.id == null} ? 'Book Appointment' : 'Update Appointment'"></span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </th:block>
</th:block>
</body>
</html>
