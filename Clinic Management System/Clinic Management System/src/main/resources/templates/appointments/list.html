<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{layout/base :: head}"></th:block></head>
<body>
<th:block th:replace="~{layout/base :: body(content=~{::content}, pageTitle='Appointments', activePage='appointments')}">
    <th:block th:fragment="content">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h5 class="mb-0 fw-bold">Appointments</h5>
                <small class="text-muted" th:text="${appointments.size()} + ' total appointments'"></small>
            </div>
            <a th:href="@{/appointments/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i> New Appointment
            </a>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th class="ps-4">#</th>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Notes</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="apt : ${appointments}">
                        <td class="ps-4 text-muted" th:text="${apt.id}"></td>
                        <td>
                            <span class="fw-semibold" th:text="${apt.patient.fullName}"></span>
                        </td>
                        <td>
                            <span th:text="${apt.doctor.fullName}"></span>
                            <small class="text-muted d-block"
                                   th:text="${apt.doctor.specialization}"></small>
                        </td>
                        <td th:text="${apt.appointmentDate}"></td>
                        <td th:text="${apt.appointmentTime}"></td>
                        <td>
                            <!--
                              Status'a göre renk değiştir
                              th:class ile dinamik CSS class
                            -->
                            <span th:class="${apt.status.name() == 'SCHEDULED'} ? 'badge bg-primary bg-opacity-10 text-primary' :
                                         (${apt.status.name() == 'COMPLETED'} ? 'badge bg-success bg-opacity-10 text-success' :
                                         (${apt.status.name() == 'CANCELLED'} ? 'badge bg-danger bg-opacity-10 text-danger' :
                                          'badge bg-warning bg-opacity-10 text-warning'))"
                                  th:text="${apt.status}">
                        </span>
                        </td>
                        <td>
                            <small th:text="${apt.notes} ?: '-'" class="text-muted"></small>
                        </td>
                        <td class="text-center">
                            <div class="dropdown">
                                <button class="btn btn-sm btn-outline-secondary dropdown-toggle"
                                        data-bs-toggle="dropdown">
                                    Action
                                </button>
                                <ul class="dropdown-menu">
                                    <li>
                                        <a class="dropdown-item"
                                           th:href="@{/appointments/edit/{id}(id=${apt.id})}">
                                            <i class="bi bi-pencil me-2"></i>Edit
                                        </a>
                                    </li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li>
                                        <a class="dropdown-item text-success"
                                           th:href="@{/appointments/status/{id}/COMPLETED(id=${apt.id})}">
                                            <i class="bi bi-check-circle me-2"></i>Mark Completed
                                        </a>
                                    </li>
                                    <li>
                                        <a class="dropdown-item text-danger"
                                           th:href="@{/appointments/status/{id}/CANCELLED(id=${apt.id})}">
                                            <i class="bi bi-x-circle me-2"></i>Cancel
                                        </a>
                                    </li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li>
                                        <a class="dropdown-item text-danger"
                                           th:href="@{/appointments/delete/{id}(id=${apt.id})}"
                                           th:onclick="|return confirm('Delete this appointment?')|">
                                            <i class="bi bi-trash me-2"></i>Delete
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${appointments.isEmpty()}">
                        <td colspan="8" class="text-center py-5 text-muted">
                            <i class="bi bi-calendar-x fs-1 d-block mb-2"></i>
                            No appointments yet.
                            <a th:href="@{/appointments/new}">Book first appointment</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </th:block>
</th:block>
</body>
</html>
