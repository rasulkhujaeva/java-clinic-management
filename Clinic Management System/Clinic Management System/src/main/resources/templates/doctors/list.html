<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{layout/base :: head}"></th:block></head>
<body>
<th:block th:replace="~{layout/base :: body(content=~{::content}, pageTitle='Doctors', activePage='doctors')}">
    <th:block th:fragment="content">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h5 class="mb-0 fw-bold">Doctor List</h5>
                <small class="text-muted" th:text="${doctors.size()} + ' doctors found'"></small>
            </div>
            <a th:href="@{/doctors/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i> New Doctor
            </a>
        </div>

        <div class="card mb-4">
            <div class="card-body py-3">
                <form method="get" th:action="@{/doctors}" class="d-flex gap-2">
                    <input type="text" name="search" th:value="${search}"
                           class="form-control" placeholder="Search by name..."/>
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-search"></i>
                    </button>
                    <a th:href="@{/doctors}" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th class="ps-4">#</th>
                        <th>Full Name</th>
                        <th>Specialization</th>
                        <th>License No</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="doctor : ${doctors}">
                        <td class="ps-4 text-muted" th:text="${doctor.id}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div style="width:36px;height:36px;border-radius:50%;
                                        background:#f0fdf4;color:#166534;
                                        display:flex;align-items:center;
                                        justify-content:center;font-weight:600;"
                                     th:text="${#strings.substring(doctor.fullName,0,1)}">
                                </div>
                                <span class="fw-semibold" th:text="${doctor.fullName}"></span>
                            </div>
                        </td>
                        <td>
                        <span class="badge bg-primary bg-opacity-10 text-primary"
                              th:text="${doctor.specialization}"></span>
                        </td>
                        <td th:text="${doctor.licenseNumber}"></td>
                        <td th:text="${doctor.phone}"></td>
                        <td th:text="${doctor.email} ?: '-'"></td>
                        <td>
                            <!-- Müsait mi değil mi — tıklayınca toggle edilir -->
                            <a th:href="@{/doctors/toggle/{id}(id=${doctor.id})}"
                               th:class="${doctor.available}
                                      ? 'badge-active text-decoration-none'
                                      : 'badge bg-danger bg-opacity-10 text-danger text-decoration-none'">
                                <span th:text="${doctor.available} ? 'Available' : 'Unavailable'"></span>
                            </a>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/doctors/edit/{id}(id=${doctor.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/doctors/delete/{id}(id=${doctor.id})}"
                               class="btn btn-sm btn-outline-danger"
                               th:onclick="|return confirm('Delete ${doctor.fullName}?')|">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${doctors.isEmpty()}">
                        <td colspan="8" class="text-center py-5 text-muted">
                            <i class="bi bi-person-badge fs-1 d-block mb-2"></i>
                            No doctors found.
                            <a th:href="@{/doctors/new}">Add the first doctor</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </th:block>
</th:block>
</body>
</html>
