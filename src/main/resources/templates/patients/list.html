<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!--
      Bu satır base.html'i kullan demek.
      Sidebar, navbar, CSS hepsi oradan gelir.
      Biz sadece içeriği yazıyoruz.
    -->
    <th:block th:replace="~{layout/base :: head}"></th:block>
</head>
<body>
<th:block th:replace="~{layout/base :: body(content=~{::content}, pageTitle='Patients', activePage='patients')}">

    <!--
      content → base.html'deki th:replace="${content}" buraya gelir
      pageTitle → topbar'da görünür: "Patients"
      activePage → sidebar'da "Patients" linkini aktif yapar
    -->

    <th:block th:fragment="content">

        <!-- ── ÜST BAR: Başlık + Yeni Hasta butonu ── -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h5 class="mb-0 fw-bold">Patient List</h5>
                <!--
                  ${patients.size()} → Java List'in eleman sayısı
                  Thymeleaf Java metodlarını direk çağırabilir!
                -->
                <small class="text-muted"
                       th:text="${patients.size()} + ' patients found'">
                </small>
            </div>
            <a th:href="@{/patients/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i> New Patient
            </a>
        </div>

        <!-- ── ARAMA KUTUSU ── -->
        <div class="card mb-4">
            <div class="card-body py-3">
                <!--
                  form method="get" → arama yapılınca URL şöyle olur:
                  /patients?search=ali
                  GET kullanıyoruz çünkü arama URL'de görünebilir
                -->
                <form method="get" th:action="@{/patients}"
                      class="d-flex gap-2">
                    <input type="text"
                           name="search"
                           th:value="${search}"
                           class="form-control"
                           placeholder="Search by name, phone or email..."/>
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-search"></i>
                    </button>
                    <!-- Aramayı temizle -->
                    <a th:href="@{/patients}" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </form>
            </div>
        </div>

        <!-- ── HASTA TABLOSU ── -->
        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th class="ps-4">#</th>
                        <th>Full Name</th>
                        <th>Date of Birth</th>
                        <th>Gender</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Blood Type</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>

                    <!--
                      th:each → Java'daki for-each döngüsü
                      "patient : ${patients}" →
                        patients listesindeki her elemanı
                        'patient' değişkenine at, satır oluştur
                    -->
                    <tr th:each="patient : ${patients}">
                        <td class="ps-4 text-muted"
                            th:text="${patient.id}"></td>

                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <!-- Avatar — ismin baş harfi -->
                                <div style="width:36px; height:36px; border-radius:50%;
                                            background:#eff6ff; color:#2563eb;
                                            display:flex; align-items:center;
                                            justify-content:center; font-weight:600;
                                            font-size:0.85rem;"
                                     th:text="${#strings.substring(patient.fullName,0,1)}">
                                </div>
                                <span class="fw-semibold"
                                      th:text="${patient.fullName}"></span>
                            </div>
                        </td>

                        <td th:text="${patient.dateOfBirth}"></td>

                        <td>
                            <!--
                              th:text → değeri yaz
                              Enum.name() → "MALE", "FEMALE" döner
                            -->
                            <span th:text="${patient.gender}"></span>
                        </td>

                        <td th:text="${patient.phone}"></td>

                        <!--
                          th:text="${patient.email} ?: '-'"
                          ?: → Elvis operatörü: null ise '-' göster
                        -->
                        <td th:text="${patient.email} ?: '-'"></td>

                        <td>
                            <span th:if="${patient.bloodType != null}"
                                  class="badge bg-danger bg-opacity-10
                                         text-danger fw-semibold"
                                  th:text="${patient.bloodType}">
                            </span>
                            <span th:unless="${patient.bloodType != null}"
                                  class="text-muted">-</span>
                        </td>

                        <!-- Düzenle / Sil butonları -->
                        <td class="text-center">
                            <a th:href="@{/patients/edit/{id}(id=${patient.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <!--
                              Silmeden önce onay sor
                              onclick="return confirm(...)" → JavaScript
                            -->
                            <a th:href="@{/patients/delete/{id}(id=${patient.id})}"
                               class="btn btn-sm btn-outline-danger"
                               th:onclick="|return confirm('Delete ${patient.fullName}?')|">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>

                    <!-- Liste boşsa mesaj göster -->
                    <tr th:if="${patients.isEmpty()}">
                        <td colspan="8" class="text-center py-5 text-muted">
                            <i class="bi bi-people fs-1 d-block mb-2"></i>
                            No patients found.
                            <a th:href="@{/patients/new}">Add the first patient</a>
                        </td>
                    </tr>

                    </tbody>
                </table>
            </div>
        </div>

    </th:block>
</th:block>
</body>
</html>
