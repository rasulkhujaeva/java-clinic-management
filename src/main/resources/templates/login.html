<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | ClinicMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-icon {
            width: 64px; height: 64px;
            background: #eff6ff;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
        }
        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }
        .btn-login {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #1d4ed8; color: white; }
        .input-group-text {
            background: #f8fafc;
            border-right: none;
            color: #94a3b8;
        }
        .form-control { border-left: none; }
    </style>
</head>
<body>
<div class="login-card">

    <!-- Logo -->
    <div class="brand">
        <div class="brand-icon">
            <i class="bi bi-hospital text-primary fs-3"></i>
        </div>
        <h4 class="fw-bold mb-1">ClinicMS</h4>
        <p class="text-muted" style="font-size:0.9rem;">Clinic Management System</p>
    </div>

    <!-- Hata mesajı -->
    <div th:if="${param.error}"
         class="alert alert-danger py-2 mb-3" style="border-radius:10px;border:none;">
        <i class="bi bi-exclamation-circle me-2"></i>
        Invalid username or password.
    </div>

    <!-- Çıkış mesajı -->
    <div th:if="${param.logout}"
         class="alert alert-success py-2 mb-3" style="border-radius:10px;border:none;">
        <i class="bi bi-check-circle me-2"></i>
        You have been logged out.
    </div>

    <!-- Login formu -->
    <!--
      th:action="@{/login}" → Spring Security bu URL'i dinler
      method="post" → POST /login gönderilir
      Spring Security otomatik yakalar, bizim controller yazmamıza gerek yok!
    -->
    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label class="form-label fw-semibold text-dark">Username</label>
            <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>
                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter username"
                       autofocus required/>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold text-dark">Password</label>
            <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter password"
                       required/>
            </div>
        </div>

        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Sign In
        </button>

    </form>

    <div class="text-center mt-3">
        <small class="text-muted">Default: admin / admin123</small>
    </div>

</div>
</body>
</html>
