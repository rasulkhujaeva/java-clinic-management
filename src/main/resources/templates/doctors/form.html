<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{layout/base :: head}"></th:block></head>
<body>
<th:block th:replace="~{layout/base :: body(
    content=~{::content},
    pageTitle=${doctor.id == null} ? 'New Doctor' : 'Edit Doctor',
    activePage='doctors')}">
    <th:block th:fragment="content">

        <div class="mb-4">
            <a th:href="@{/doctors}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i> Back to Doctors
            </a>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header d-flex align-items-center gap-2">
                        <i class="bi bi-person-badge text-success"></i>
                        <span th:text="${doctor.id == null} ? 'Add New Doctor' : 'Edit Doctor: ' + doctor.fullName"></span>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/doctors/save}" th:object="${doctor}" method="post">
                            <input type="hidden" th:field="*{id}"/>

                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
                                    <input type="text" th:field="*{fullName}" class="form-control"
                                           th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                                           placeholder="Dr. John Smith"/>
                                    <div class="invalid-feedback" th:errors="*{fullName}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Specialization <span class="text-danger">*</span></label>
                                    <select th:field="*{specialization}" class="form-select"
                                            th:classappend="${#fields.hasErrors('specialization')} ? 'is-invalid'">
                                        <option value="">Select specialization...</option>
                                        <option value="General Practice">General Practice</option>
                                        <option value="Cardiology">Cardiology</option>
                                        <option value="Dentistry">Dentistry</option>
                                        <option value="Neurology">Neurology</option>
                                        <option value="Orthopedics">Orthopedics</option>
                                        <option value="Pediatrics">Pediatrics</option>
                                        <option value="Dermatology">Dermatology</option>
                                        <option value="Ophthalmology">Ophthalmology</option>
                                        <option value="Psychiatry">Psychiatry</option>
                                        <option value="Surgery">Surgery</option>
                                    </select>
                                    <div class="invalid-feedback" th:errors="*{specialization}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">License Number <span class="text-danger">*</span></label>
                                    <input type="text" th:field="*{licenseNumber}" class="form-control"
                                           th:classappend="${#fields.hasErrors('licenseNumber')} ? 'is-invalid'"
                                           placeholder="LIC-12345"/>
                                    <div class="invalid-feedback" th:errors="*{licenseNumber}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Phone <span class="text-danger">*</span></label>
                                    <input type="tel" th:field="*{phone}" class="form-control"
                                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                           placeholder="+1 555 0000"/>
                                    <div class="invalid-feedback" th:errors="*{phone}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input type="email" th:field="*{email}" class="form-control"
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                           placeholder="doctor@clinic.com"/>
                                    <div class="invalid-feedback" th:errors="*{email}"></div>
                                </div>

                                <div class="col-md-12">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox"
                                               th:field="*{available}" role="switch"/>
                                        <label class="form-check-label fw-semibold">
                                            Available for appointments
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-2 mt-4 pt-3 border-top justify-content-end">
                                <a th:href="@{/doctors}" class="btn btn-outline-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-check-lg me-1"></i>
                                    <span th:text="${doctor.id == null} ? 'Save Doctor' : 'Update Doctor'"></span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </th:block>
</th:block>
</body>
</html>
