<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><th:block th:replace="~{layout/base :: head}"></th:block></head>
<body>
<th:block th:replace="~{layout/base :: body(content=~{::content}, pageTitle='Process Payment', activePage='billing')}">
    <th:block th:fragment="content">

        <div class="mb-4">
            <a th:href="@{/billing}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i> Back
            </a>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card">
                    <div class="card-header d-flex align-items-center gap-2">
                        <i class="bi bi-cash-coin text-success"></i>
                        Process Payment
                    </div>
                    <div class="card-body p-4">

                        <!-- Fatura özeti -->
                        <div class="bg-light rounded p-3 mb-4">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Patient</span>
                                <span class="fw-semibold" th:text="${bill.appointment.patient.fullName}"></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Doctor</span>
                                <span th:text="${bill.appointment.doctor.fullName}"></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Consultation</span>
                                <span th:text="'$' + ${bill.consultationFee}"></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Medication</span>
                                <span th:text="'$' + ${bill.medicationFee}"></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Lab</span>
                                <span th:text="'$' + ${bill.labFee}"></span>
                            </div>
                            <hr/>
                            <div class="d-flex justify-content-between">
                                <span class="fw-bold">Total Due</span>
                                <span class="fw-bold fs-5 text-primary"
                                      th:text="'$' + ${bill.totalAmount}"></span>
                            </div>
                        </div>

                        <form th:action="@{/billing/pay/{id}(id=${bill.id})}" method="post">
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Payment Method</label>
                                <div class="row g-2">
                                    <div class="col-6" th:each="method : ${paymentMethods}">
                                        <input type="radio" class="btn-check"
                                               name="paymentMethod"
                                               th:id="${method}"
                                               th:value="${method}" required/>
                                        <label class="btn btn-outline-primary w-100"
                                               th:for="${method}"
                                               th:text="${method}">
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 py-2">
                                <i class="bi bi-check-circle me-2"></i>
                                Confirm Payment
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </th:block>
</th:block>
</body>
</html>
